// Konfiguration der PV-Anzeige
// Die Datei PVconfig.ini muss in das Startverzeichnis von PV-Anzeige.EXE kopiert werden!!

// Version der INI-datei
[INIVERSION]
2.03

// IP und Port des SmartCharger Controllers (ein Raspberry Pi)
// 	xx.xx durch die reale IP Adresse des RasPi ersetzen
[SMARTCHARGERIP]
192.168.xx.xx

[SMARTCHARGERPORT]
18001

// Port des Modbus Daemon (MBMD)
[MBMDPORT]
8080

// Icons oder Bilder der Fahrzeuge
[REALPICS]
0

//  IP und Port des EVCC Controllers (ein Raspberry Pi)
[EVCCIP]
192.168.xx.xx

[EVCCPORT]
7070

// Daten werden von EVCC geliefert
// Value = EVCC
[DATAPROVIDER]
EVCC
